<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 240" width="1180" height="240" role="img" aria-label="TaskFlow — kanban banner">
<defs>
<linearGradient id="tg" x1="0" y1="0" x2="1" y2="0">
  <stop offset="0%" stop-color="#ea580c"><animate attributeName="stop-color" values="#ea580c;#fbbf24;#ea580c" dur="6s" repeatCount="indefinite"/></stop>
  <stop offset="100%" stop-color="#fbbf24"><animate attributeName="stop-color" values="#fbbf24;#ea580c;#fbbf24" dur="6s" repeatCount="indefinite"/></stop>
</linearGradient>
<clipPath id="tc"><rect width="1180" height="240" rx="18"/></clipPath>
</defs>
<g clip-path="url(#tc)">
<rect width="1180" height="240" fill="#431407"/>
<text x="80" y="112" font-family="Arial Black,Arial" font-weight="900" font-size="58" fill="url(#tg)">TASKFLOW</text>
<text x="82" y="150" font-family="monospace" font-size="16" fill="#fcd34d">kanban boards · priority tags · sprint tracking</text>
<text x="82" y="188" font-family="monospace" font-size="15" fill="#fdba74" opacity="0">this README is itself a board →<animate attributeName="opacity" values="0;1" begin="1s" dur="0.4s" fill="freeze"/></text>
<g font-family="monospace" font-size="12">
  <rect x="640" y="40" width="160" height="170" rx="8" fill="#57200e"/><text x="656" y="62" fill="#fdba74">BACKLOG</text>
  <rect x="815" y="40" width="160" height="170" rx="8" fill="#57200e"/><text x="831" y="62" fill="#fdba74">IN PROGRESS</text>
  <rect x="990" y="40" width="160" height="170" rx="8" fill="#57200e"/><text x="1006" y="62" fill="#fdba74">DONE ✓</text>
  <rect x="656" y="78" width="128" height="34" rx="6" fill="#7c2d12"/>
  <rect x="656" y="120" width="128" height="34" rx="6" fill="#7c2d12"/>
  <rect x="1006" y="78" width="128" height="34" rx="6" fill="#14532d"/>
  <g>
    <rect x="656" y="162" width="128" height="34" rx="6" fill="url(#tg)">
      <animate attributeName="x" values="656;656;831;831;1006;1006;656" keyTimes="0;0.2;0.32;0.55;0.67;0.95;1" dur="7s" repeatCount="indefinite"/>
      <animate attributeName="y" values="162;162;78;78;120;120;162" keyTimes="0;0.2;0.32;0.55;0.67;0.95;1" dur="7s" repeatCount="indefinite"/>
    </rect>
    <text x="672" y="184" fill="#431407" font-weight="bold">SHIP IT 🔴
      <animate attributeName="x" values="672;672;847;847;1022;1022;672" keyTimes="0;0.2;0.32;0.55;0.67;0.95;1" dur="7s" repeatCount="indefinite"/>
      <animate attributeName="y" values="184;184;100;100;142;142;184" keyTimes="0;0.2;0.32;0.55;0.67;0.95;1" dur="7s" repeatCount="indefinite"/>
    </text>
  </g>
</g>
<rect x="0" y="234" width="1180" height="6" fill="url(#tg)"><animate attributeName="width" values="0;1180" dur="2s" fill="freeze"/></rect>
</g>
<rect x="1" y="1" width="1178" height="238" rx="18" fill="none" stroke="url(#tg)" stroke-width="1.4" opacity="0.6"/>
</svg>
